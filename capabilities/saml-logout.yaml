naftiko: 1.0.0-alpha2
info:
  label: SAML 2.0 SSO API — Logout
  description: 'SAML 2.0 SSO API — Logout. 1 operations. Lead operation: Initiate SAML Single Logout. Self-contained Naftiko
    capability covering one Sso business surface.'
  tags:
  - Sso
  - Logout
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SSO_API_KEY: SSO_API_KEY
capability:
  consumes:
  - type: http
    namespace: saml-logout
    baseUri: https://your-idp.example.com
    description: SAML 2.0 SSO API — Logout business capability. Self-contained, no shared references.
    resources:
    - name: saml-logout
      path: /saml/logout
      operations:
      - name: initiatesamllogout
        method: GET
        description: Initiate SAML Single Logout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SAMLRequest
          in: query
          type: string
          description: Base64-encoded deflated LogoutRequest XML
        - name: SAMLResponse
          in: query
          type: string
          description: Base64-encoded deflated LogoutResponse XML from IdP
        - name: RelayState
          in: query
          type: string
          description: Opaque state value
        - name: SigAlg
          in: query
          type: string
          description: Signature algorithm URI
        - name: Signature
          in: query
          type: string
          description: Base64-encoded request signature
  exposes:
  - type: rest
    namespace: saml-logout-rest
    port: 8080
    description: REST adapter for SAML 2.0 SSO API — Logout. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/saml/logout
      name: saml-logout
      description: REST surface for saml-logout.
      operations:
      - method: GET
        name: initiatesamllogout
        description: Initiate SAML Single Logout
        call: saml-logout.initiatesamllogout
        with:
          SAMLRequest: rest.SAMLRequest
          SAMLResponse: rest.SAMLResponse
          RelayState: rest.RelayState
          SigAlg: rest.SigAlg
          Signature: rest.Signature
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: saml-logout-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAML 2.0 SSO API — Logout. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: initiate-saml-single-logout
      description: Initiate SAML Single Logout
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: saml-logout.initiatesamllogout
      with:
        SAMLRequest: tools.SAMLRequest
        SAMLResponse: tools.SAMLResponse
        RelayState: tools.RelayState
        SigAlg: tools.SigAlg
        Signature: tools.Signature
      outputParameters:
      - type: object
        mapping: $.
