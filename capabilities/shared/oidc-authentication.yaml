naftiko: "1.0.0-alpha1"

info:
  label: "OpenID Connect Authentication"
  description: "OpenID Connect (OIDC) authentication API for token exchange, user info retrieval, provider discovery, and token revocation."
  tags:
    - SSO
    - OIDC
    - Authentication
    - Identity
    - OAuth
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      OIDC_CLIENT_ID: OIDC_CLIENT_ID
      OIDC_CLIENT_SECRET: OIDC_CLIENT_SECRET
      OIDC_ACCESS_TOKEN: OIDC_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: oidc-authentication
      baseUri: https://your-idp.example.com
      description: "OpenID Connect authentication and token endpoints"
      resources:
        - name: token
          path: /token
          description: "Token endpoint for code exchange and refresh"
          operations:
            - name: exchange-token
              method: POST
              description: "Exchange authorization code for access token, ID token, and refresh token"
              body:
                type: form
                data:
                  grant_type: "{{tools.grant_type}}"
                  code: "{{tools.code}}"
                  redirect_uri: "{{tools.redirect_uri}}"
                  client_id: "{{OIDC_CLIENT_ID}}"
                  client_secret: "{{OIDC_CLIENT_SECRET}}"
                  code_verifier: "{{tools.code_verifier}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: userinfo
          path: /userinfo
          description: "UserInfo endpoint for retrieving authenticated user claims"
          operations:
            - name: get-user-info
              method: GET
              description: "Get the authenticated user's profile claims"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: jwks
          path: /jwks
          description: "JWKS endpoint for public key retrieval"
          operations:
            - name: get-jwks
              method: GET
              description: "Get JSON Web Key Set for ID token signature verification"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: discovery
          path: /.well-known/openid-configuration
          description: "OpenID Provider discovery metadata"
          operations:
            - name: get-oidc-discovery
              method: GET
              description: "Get OpenID Provider configuration metadata"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: oidc-api
      resources:
        - path: /v1/token
          name: token
          operations:
            - method: POST
              name: exchange-token
              call: "oidc-authentication.exchange-token"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/userinfo
          name: userinfo
          operations:
            - method: GET
              name: get-user-info
              call: "oidc-authentication.get-user-info"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: oidc-mcp
      transport: http
      tools:
        - name: exchange-authorization-code
          description: "Exchange an OIDC authorization code for access token, ID token, and optional refresh token"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "oidc-authentication.exchange-token"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-user-profile
          description: "Retrieve the authenticated user's profile claims from the OIDC UserInfo endpoint"
          hints:
            readOnly: true
            idempotent: true
          call: "oidc-authentication.get-user-info"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-provider-keys
          description: "Get JWKS public keys for verifying OIDC ID token signatures"
          hints:
            readOnly: true
            idempotent: true
          call: "oidc-authentication.get-jwks"
          outputParameters:
            - type: object
              mapping: "$."

        - name: discover-oidc-configuration
          description: "Retrieve OpenID Provider configuration metadata including all endpoint URLs and supported features"
          hints:
            readOnly: true
            idempotent: true
          call: "oidc-authentication.get-oidc-discovery"
          outputParameters:
            - type: object
              mapping: "$."
