naftiko: 1.0.0-alpha2
info:
  label: OpenID Connect (OIDC) SSO API — Token
  description: 'OpenID Connect (OIDC) SSO API — Token. 2 operations. Lead operation: Revoke Token. Self-contained Naftiko
    capability covering one Sso business surface.'
  tags:
  - Sso
  - Token
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SSO_API_KEY: SSO_API_KEY
capability:
  consumes:
  - type: http
    namespace: oidc-token
    baseUri: https://your-idp.example.com
    description: OpenID Connect (OIDC) SSO API — Token business capability. Self-contained, no shared references.
    resources:
    - name: revoke
      path: /revoke
      operations:
      - name: revoketoken
        method: POST
        description: Revoke Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: token
      path: /token
      operations:
      - name: exchangetoken
        method: POST
        description: Exchange Authorization Code for Tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SSO_API_KEY}}'
  exposes:
  - type: rest
    namespace: oidc-token-rest
    port: 8080
    description: REST adapter for OpenID Connect (OIDC) SSO API — Token. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/revoke
      name: revoke
      description: REST surface for revoke.
      operations:
      - method: POST
        name: revoketoken
        description: Revoke Token
        call: oidc-token.revoketoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/token
      name: token
      description: REST surface for token.
      operations:
      - method: POST
        name: exchangetoken
        description: Exchange Authorization Code for Tokens
        call: oidc-token.exchangetoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oidc-token-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenID Connect (OIDC) SSO API — Token. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: revoke-token
      description: Revoke Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: oidc-token.revoketoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: exchange-authorization-code-tokens
      description: Exchange Authorization Code for Tokens
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: oidc-token.exchangetoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
